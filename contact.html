<!DOCTYPE html>
<html>
<head>
<title>Contact</title>
<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
    color:#333;
}

.navbar{
    background:#0F172A;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 50px;
}

.logo{
    display:flex;
    align-items:center;
    color:white;
}

.logo img{
    width:60px;
    height:auto;
    margin-right:10px;
}

.nav-links{
    list-style:none;
    display:flex;
}

.nav-links li{
    margin-left:20px;
}

.nav-links a{
    text-decoration:none;
    color:white;
    font-size:18px;
    transition:0.3s;
}

.nav-links a:hover{
    color:#F59E0B;
}


.banner{
    background:linear-gradient(135deg,#06B6D4,#0F172A);
    color:white;
    text-align:center;
    padding:60px 20px;
}

.banner h1{
    font-size:45px;
    margin-bottom:10px;
}

.banner p{
    font-size:20px;
}

.contact{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:40px;
    flex-wrap:wrap;
    padding:50px;
}

.info{
    width:350px;
}

.info h2{
    color:#06B6D4;
    margin-bottom:20px;
}

.info p{
    font-size:18px;
    margin-bottom:15px;
    line-height:1.6;
}

.form{
    width:450px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.form h2{
    text-align:center;
    color:#06B6D4;
    margin-bottom:20px;
}

.form input,
.form textarea{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    outline:none;
}

.form input:focus,
.form textarea:focus{
    border:1px solid #06B6D4;
}

.form textarea{
    resize:none;
}

.form button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#F59E0B;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.form button:hover{
    background:#d97706;
}

footer{
    background:#0F172A;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:30px;
}


@media (max-width:768px){

    .navbar{
        flex-direction:column;
        padding:20px;
    }

    .nav-links{
        flex-direction:column;
        align-items:center;
        margin-top:15px;
    }

    .nav-links li{
        margin:10px 0;
    }

    .banner h1{
        font-size:35px;
    }

    .banner p{
        font-size:18px;
    }

    .contact{
        flex-direction:column;
        align-items:center;
        padding:30px 20px;
    }

    .info,
    .form{
        width:100%;
        max-width:450px;
    }
}
</style>
</head>
<body>

<nav class="navbar">

<div class="logo">

<img src="smartserve logo.png">

<h2>SmartServe</h2>

</div>

<ul class="nav-links">

<li><a href="index.html">Home</a></li>

<li><a href="about.html">About</a></li>

<li><a href="contact.html">Contact</a></li>

</ul>

</nav>

<section class="banner">

<h1>Contact Us</h1>

<p>We are always happy to help you.</p>

</section>
<section class="contact">

<div class="info">

<h2>Contact Information</h2>

<p>📍 Arni, Tamil Nadu</p>

<p>📞 +91 9876543210</p>

<p>📧 smartserve@gmail.com</p>

<p>🕒 Open: 9:00 AM - 10:00 PM</p>

</div>

<div class="form">

<h2>Send Message</h2>

<form>

<input type="text" placeholder="Enter Your Name" required>

<input type="email" placeholder="Enter Your Email" required>

<input type="text" placeholder="Subject" required>

<textarea rows="5" placeholder="Your Message" required></textarea>

<button type="button"onclick"submit()">Send Message</button>

</form>

</div>
