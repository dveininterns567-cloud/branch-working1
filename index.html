<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dessert Heaven</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation -->
    <header>
        <nav>
            <h2 class="logo">🍰 Dessert Heaven</h2>

            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Desserts</a></li>
                <li><a href="#">Menu</a></li>
                <li><a href="#">Gallery</a></li>
                <li><a href="#">Contact</a></li>
            </ul>

            <div class="search-box">
                <input type="text" placeholder="🔍 Search desserts...">
            </div>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Most Delicious Desserts</h1>
            <p>Freshly baked cakes, pastries, cookies and ice creams made with love.</p>

            <button>Explore Menu</button>
        </div>
    </section>

    <!-- Featured Desserts -->
    <section class="cards">

        <div class="card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRQalgjZbtbJ529rhY3K3K8TFa4d41SFFivVLO1bVJN1g&s=10" alt="">
            <h3>Chocolate Cake</h3>
            <p>Rich chocolate layered cake.</p>
        </div>

        <div class="card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSL3ohiA57ff5O0sK4yN348jMVMPir4aRpYrHskOk-c5A&s=10" alt="">
            <h3>Donut</h3>
            <p>Soft and sweet glazed donut.</p>
        </div>

        <div class="card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQHzhRd7-O1K83zFIqWsOQSW3j76-dTg_tOTT1xidelgg&s=10" alt="">
            <h3>Ice Cream</h3>
            <p>Cold creamy dessert.</p>
        </div>

    </section>

</body>
</html>
